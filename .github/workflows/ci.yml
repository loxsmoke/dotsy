name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      # Provide ripgrep locally so GrepTool tests resolve it via PATH instead of
      # downloading it from GitHub releases at test time (which intermittently hits
      # GitHub's unauthenticated rate limit and fails with HTTP 403).
      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Test
        run: dotnet test --no-build --configuration Release --logger trx --results-directory ./test-results --collect "XPlat Code Coverage"

      - name: Summarize code coverage
        if: always()
        shell: pwsh
        run: |
          $reports = Get-ChildItem ./test-results -Recurse -Filter coverage.cobertura.xml |
            Group-Object { (Get-FileHash $_.FullName -Algorithm SHA256).Hash } |
            ForEach-Object { $_.Group[0] }

          if (-not $reports) {
            "## Code coverage" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "No coverage reports were produced." >> $env:GITHUB_STEP_SUMMARY
            exit 0
          }

          function Normalize-CoverageFile([string]$assembly, [string]$file) {
            $normalized = $file.Replace("/", "\")
            if ($assembly -ne "dotsy") {
              $prefix = "$assembly\"
              if ($normalized.StartsWith($prefix, [System.StringComparison]::OrdinalIgnoreCase)) {
                $normalized = $normalized.Substring($prefix.Length)
              }
            }
            return $normalized.ToLowerInvariant()
          }

          $assemblyLines = @{}

          foreach ($report in $reports) {
            [xml]$coverage = Get-Content $report.FullName -Raw

            foreach ($package in $coverage.coverage.packages.package) {
              $assembly = [string]$package.name
              if ([string]::IsNullOrWhiteSpace($assembly) -or $assembly.EndsWith(".Tests", [System.StringComparison]::OrdinalIgnoreCase)) {
                continue
              }

              if (-not $assemblyLines.ContainsKey($assembly)) {
                $assemblyLines[$assembly] = @{}
              }

              foreach ($class in $package.classes.class) {
                $file = [string]$class.filename
                if ([string]::IsNullOrWhiteSpace($file)) {
                  continue
                }

                $normalizedFile = Normalize-CoverageFile $assembly $file
                if ($normalizedFile.StartsWith("tests\", [System.StringComparison]::OrdinalIgnoreCase)) {
                  continue
                }

                foreach ($line in $class.lines.line) {
                  $lineNumber = [string]$line.number
                  if ([string]::IsNullOrWhiteSpace($lineNumber)) {
                    continue
                  }

                  $lineKey = "$normalizedFile`:$lineNumber"
                  if (-not $assemblyLines[$assembly].ContainsKey($lineKey)) {
                    $assemblyLines[$assembly][$lineKey] = $false
                  }

                  if ([int]$line.hits -gt 0) {
                    $assemblyLines[$assembly][$lineKey] = $true
                  }
                }
              }
            }
          }

          $totalLinesCovered = 0
          $totalLinesValid = 0

          "## Code coverage" >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY
          "Coverage is merged by production assembly, source file, and line number. Test assemblies are excluded." >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY
          "| Assembly | Lines | Covered | Total |" >> $env:GITHUB_STEP_SUMMARY
          "| --- | ---: | ---: | ---: |" >> $env:GITHUB_STEP_SUMMARY

          foreach ($assembly in ($assemblyLines.Keys | Sort-Object)) {
            $lines = $assemblyLines[$assembly]
            $linesValid = $lines.Count
            $linesCovered = @($lines.Values | Where-Object { $_ }).Count
            $lineRate = if ($linesValid -gt 0) { $linesCovered / $linesValid * 100 } else { 0 }

            $totalLinesCovered += $linesCovered
            $totalLinesValid += $linesValid

            "| $assembly | $($lineRate.ToString('0.00'))% | $linesCovered | $linesValid |" >> $env:GITHUB_STEP_SUMMARY
          }

          $totalLineRate = if ($totalLinesValid -gt 0) { $totalLinesCovered / $totalLinesValid * 100 } else { 0 }

          "| **Total** | **$($totalLineRate.ToString('0.00'))%** | **$totalLinesCovered** | **$totalLinesValid** |" >> $env:GITHUB_STEP_SUMMARY

          $color = if ($totalLineRate -ge 80) { "brightgreen" } elseif ($totalLineRate -ge 60) { "yellowgreen" } elseif ($totalLineRate -ge 40) { "yellow" } elseif ($totalLineRate -ge 20) { "orange" } else { "red" }
          $coverageBadgeUrl = "https://img.shields.io/badge/coverage-$($totalLineRate.ToString('0.00'))%25-$color"
          $readme = Get-Content ./README.md -Raw
          $readme = $readme -replace 'https://img\.shields\.io/badge/coverage-[^)]+', $coverageBadgeUrl
          Set-Content ./README.md -Value $readme -NoNewline

      - name: Update coverage badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: pwsh
        run: |
          if (-not (Test-Path ./README.md)) {
            Write-Host "README.md was not found."
            exit 0
          }

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md

          git diff --cached --quiet
          if ($LASTEXITCODE -ne 0) {
            git commit -m "Update coverage badge"
            git push
          } else {
            Write-Host "Coverage badge is already current."
          }

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-results
          path: |
            ./test-results/**/*.trx
            ./test-results/**/coverage.cobertura.xml
